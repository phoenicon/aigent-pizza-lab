<!DOCTYPE html>
<html>
<head>
<title>Aigent Pizza Lab</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
}

.pizza{
width:400px;
height:400px;
border-radius:50%;
background:radial-gradient(circle,#ff9933,#cc3300);
margin:50px auto;
position:relative;
}

.slice{
position:absolute;
width:50%;
height:50%;
background:rgba(255,255,255,0.1);
transform-origin:100% 100%;
border:1px solid rgba(255,255,255,0.2);
}

.core{
position:absolute;
top:45%;
left:45%;
width:40px;
height:40px;
border-radius:50%;
background:#00ffcc;
}

</style>
</head>

<body>

<h1>🍕 Aigent Pizza Lab</h1>

<div class="pizza">

<div class="slice" style="transform:rotate(0deg)"></div>
<div class="slice" style="transform:rotate(45deg)"></div>
<div class="slice" style="transform:rotate(90deg)"></div>
<div class="slice" style="transform:rotate(135deg)"></div>
<div class="slice" style="transform:rotate(180deg)"></div>
<div class="slice" style="transform:rotate(225deg)"></div>
<div class="slice" style="transform:rotate(270deg)"></div>
<div class="slice" style="transform:rotate(315deg)"></div>

<div class="core"></div>

</div>

<p>AI Agent Operations Dashboard</p>

</body>
</html>
